<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prediction Bot Admin</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#e8e8f5;font-family:system-ui,sans-serif}
button{font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  bg0:"#080810", bg1:"#0f0f1c", bg2:"#15152a", bg3:"#1c1c35",
  border:"#252540",
  text1:"#e8e8f5", text2:"#9090b8", text3:"#55557a",
  purple:"#7c6af7", purpleDim:"#2a2550", purpleText:"#c4baff",
  green:"#22c55e", greenDim:"#0f2a1a", greenText:"#86efac",
  amber:"#f59e0b", amberDim:"#2a1f08", amberText:"#fcd34d",
  red:"#ef4444", redDim:"#2a0f0f", redText:"#fca5a5",
  blue:"#3b82f6", blueDim:"#0f1e2a", blueText:"#93c5fd",
  teal:"#14b8a6", tealDim:"#0a2020", tealText:"#5eead4",
};

const NAV = [
  {id:"overview", label:"Overview", icon:"⊞"},
  {id:"users", label:"Users", icon:"👥"},
  {id:"fixtures", label:"Fixtures", icon:"⚽"},
  {id:"leaderboard", label:"Leaderboard", icon:"🏆"},
  {id:"audit", label:"Audit Log", icon:"📋"},
  {id:"settings", label:"Settings", icon:"⚙️"},
  {id:"system", label:"System", icon:"🖥"},
];

const card = {background:C.bg2, border:"0.5px solid "+C.border, borderRadius:12, padding:"1rem 1.25rem"};
const secTitle = {fontSize:11, fontWeight:500, color:C.text3, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:12};

// Get API key from meta tag injected by server
const API_KEY = document.querySelector('meta[name="api-key"]')?.content || "";

async function api(path, opts={}) {
  const res = await fetch(path, {
    ...opts,
    headers: {"Authorization":"Bearer "+API_KEY, "Content-Type":"application/json", ...(opts.headers||{})},
  });
  if (!res.ok) throw new Error(res.status+" "+res.statusText);
  return res.json();
}

function useApi(path, deps=[]) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [tick, setTick] = React.useState(0);
  const retry = React.useCallback(() => setTick(t=>t+1), []);
  React.useEffect(() => {
    if (!path) { setLoading(false); return; }
    let cancelled = false;
    setLoading(true); setError(null);
    api(path)
      .then(d => { if (!cancelled) { setData(d); setLoading(false); }})
      .catch(e => { if (!cancelled) { setError(e.message); setLoading(false); }});
    return () => { cancelled = true; };
  }, [path, tick, ...deps]);
  return {data, loading, error, retry, setData};
}

function Spinner() {
  return React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",color:C.text3}}, "⟳ Loading...");
}

function ErrBox({msg, onRetry}) {
  return React.createElement("div", {style:{background:C.redDim,border:"0.5px solid "+C.red,borderRadius:10,padding:"1rem",color:C.redText,fontSize:13,display:"flex",alignItems:"center",justifyContent:"space-between"}},
    React.createElement("span", null, "⚠ "+msg),
    onRetry && React.createElement("button", {onClick:onRetry, style:{background:C.red,border:"none",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:12,marginLeft:12}}, "Retry")
  );
}

function Pill({children, color, bg}) {
  return React.createElement("span", {style:{background:bg,color,fontSize:11,fontWeight:500,padding:"2px 9px",borderRadius:99}}, children);
}

function Toggle({value, onChange}) {
  return React.createElement("div", {
    onClick: onChange,
    style:{width:34,height:18,borderRadius:9,background:value?C.purple:C.bg3,position:"relative",flexShrink:0,border:"0.5px solid "+(value?C.purple:C.border),cursor:"pointer"}
  }, React.createElement("div", {style:{width:12,height:12,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:value?19:3,transition:"left 0.2s"}}));
}

function Toast({msg, onClose}) {
  if (!msg) return null;
  return React.createElement("div", {style:{position:"fixed",bottom:24,right:24,background:C.bg3,border:"0.5px solid "+C.purple,borderRadius:10,padding:"10px 16px",fontSize:13,color:C.purpleText,zIndex:999,display:"flex",alignItems:"center",gap:10}},
    "✓ "+msg,
    React.createElement("button", {onClick:onClose, style:{background:"none",border:"none",color:C.text3,fontSize:16,lineHeight:1}}, "×")
  );
}

// ── Overview ──────────────────────────────────────────────────

function OverviewPage({ovData, onToast, onRefresh}) {
  const [acting, setActing] = React.useState({});

  async function doAction(key, path, label) {
    setActing(a => ({...a, [key]:true}));
    try {
      await api(path, {method:"POST"});
      onToast(label+" done!");
      onRefresh();
    } catch(e) { onToast("Error: "+e.message); }
    setActing(a => ({...a, [key]:false}));
  }

  if (!ovData) return React.createElement(Spinner);
  const gw = ovData.current_gw || {};
  const matches = gw.matches || [];

  const stats = [
    {label:"Upcoming", value:ovData.upcoming_matches||0, icon:"📅", color:C.blue},
    {label:"Predictions", value:ovData.total_predictions||0, icon:"📝", color:C.purple},
    {label:"Users", value:ovData.unique_users||0, icon:"👥", color:C.teal},
    {label:"Locked", value:ovData.locked_matches||0, icon:"🔒", color:C.amber},
  ];

  const actions = [
    {key:"remind", label:"Send Reminders", icon:"🔔", path:"/api/admin/remind"},
    {key:"sync", label:"Sync Fixtures", icon:"🔄", path:"/api/admin/sync"},
    {key:"refresh", label:"Refresh", icon:"↻", action:()=>{onRefresh();onToast("Refreshed!");}},
  ];

  return React.createElement("div", null,
    React.createElement("div", {style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:"1rem"}},
      stats.map(st =>
        React.createElement("div", {key:st.label, style:card},
          React.createElement("div", {style:{fontSize:20,marginBottom:6}}, st.icon),
          React.createElement("div", {style:{fontSize:26,fontWeight:500,color:st.color}}, st.value),
          React.createElement("div", {style:{fontSize:11,color:C.text3,marginTop:2}}, st.label)
        )
      )
    ),
    React.createElement("div", {style:{...card,marginBottom:"1rem"}},
      React.createElement("div", {style:secTitle}, "Quick actions"),
      React.createElement("div", {style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}},
        actions.map(b =>
          React.createElement("button", {
            key:b.key,
            onClick: b.action || (() => doAction(b.key, b.path, b.label)),
            disabled: !!acting[b.key],
            style:{background:C.bg3,border:"0.5px solid "+C.border,borderRadius:10,padding:"10px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,opacity:acting[b.key]?0.6:1}
          },
            React.createElement("span", {style:{fontSize:18}}, acting[b.key]?"⟳":b.icon),
            React.createElement("span", {style:{fontSize:12,color:C.text1,fontWeight:500}}, b.label)
          )
        )
      )
    ),
    React.createElement("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      React.createElement("div", {style:card},
        React.createElement("div", {style:secTitle}, "GW Fixtures — "+(gw.label||"—")),
        matches.length === 0
          ? React.createElement("div", {style:{fontSize:12,color:C.text3}}, "No upcoming fixtures")
          : matches.slice(0,5).map((f,i,a) =>
              React.createElement("div", {key:i, style:{display:"flex",alignItems:"center",gap:6,padding:"7px 0",borderBottom:i<a.length-1?"0.5px solid "+C.border:"none",fontSize:12}},
                React.createElement("span", {style:{flex:1,textAlign:"right"}}, f.home_team),
                React.createElement("span", {style:{background:C.bg3,color:C.text3,fontSize:10,padding:"1px 6px",borderRadius:4}}, "vs"),
                React.createElement("span", {style:{flex:1}}, f.away_team),
                React.createElement("span", {style:{fontSize:10,color:C.text3}}, f.match_date)
              )
            )
      ),
      React.createElement("div", {style:card},
        React.createElement("div", {style:secTitle}, "Last sync"),
        React.createElement("div", {style:{fontSize:13,fontWeight:500,marginBottom:8}}, ovData.last_sync||"Never"),
        React.createElement(Pill, {color:C.greenText, bg:C.greenDim}, "football-data.org ✓")
      )
    )
  );
}

// ── Users ─────────────────────────────────────────────────────

function UsersPage() {
  const {data, loading, error, retry} = useApi("/api/admin/users");
  const [sel, setSel] = React.useState(null);

  if (loading) return React.createElement(Spinner);
  if (error) return React.createElement(ErrBox, {msg:"Failed to load users: "+error, onRetry:retry});

  const users = data?.users || [];
  const u = sel ? users.find(x => x.user_id===sel) : null;

  return React.createElement("div", {style:{display:"grid",gridTemplateColumns:sel?"1fr 300px":"1fr",gap:12}},
    React.createElement("div", {style:card},
      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        React.createElement("div", {style:secTitle}, "All users"),
        React.createElement("div", {style:{fontSize:11,color:C.text3}}, "click row for detail")
      ),
      React.createElement("table", {style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
        React.createElement("thead", null,
          React.createElement("tr", null,
            ["#","User","Points","Scored","Correct","Streak"].map(h =>
              React.createElement("th", {key:h, style:{textAlign:"left",padding:"6px 8px",color:C.text3,fontWeight:500,borderBottom:"0.5px solid "+C.border,whiteSpace:"nowrap"}}, h)
            )
          )
        ),
        React.createElement("tbody", null,
          users.map((u, i) =>
            React.createElement("tr", {
              key: u.user_id,
              onClick: () => setSel(sel===u.user_id ? null : u.user_id),
              style:{cursor:"pointer",background:sel===u.user_id?C.purpleDim:"transparent"},
              onMouseEnter: e => { if(sel!==u.user_id) e.currentTarget.style.background=C.bg3; },
              onMouseLeave: e => { if(sel!==u.user_id) e.currentTarget.style.background="transparent"; },
            },
              React.createElement("td", {style:{padding:"8px"}}, i+1),
              React.createElement("td", {style:{padding:"8px",fontWeight:500,color:C.text1}}, u.username),
              React.createElement("td", {style:{padding:"8px",color:C.purple,fontWeight:500}}, u.total_points||0),
              React.createElement("td", {style:{padding:"8px",color:C.text2}}, u.predictions_scored||0),
              React.createElement("td", {style:{padding:"8px",color:C.text2}}, u.correct_results||0),
              React.createElement("td", {style:{padding:"8px",color:u.current_streak>=3?C.amber:C.text2}},
                (u.current_streak||0) + (u.current_streak>=3?" 🔥":"")
              )
            )
          )
        )
      )
    ),
    u && React.createElement("div", {style:{...card,alignSelf:"start"}},
      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:15,fontWeight:500}}, u.username),
          React.createElement("div", {style:{fontSize:11,color:C.text3}}, "ID: "+u.user_id)
        ),
        React.createElement("button", {onClick:()=>setSel(null), style:{background:"none",border:"none",color:C.text3,fontSize:18}}, "×")
      ),
      React.createElement("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        [
          {label:"Points", value:u.total_points||0, color:C.purple},
          {label:"Correct", value:u.correct_results||0, color:C.green},
          {label:"Exact scores", value:u.exact_scores||0, color:C.amber},
          {label:"Predictions", value:u.predictions_scored||0, color:C.blue},
          {label:"Streak", value:(u.current_streak||0)+(u.current_streak>=3?" 🔥":""), color:u.current_streak>=3?C.amber:C.text1},
          {label:"Best streak", value:u.best_streak||0, color:C.teal},
        ].map(m =>
          React.createElement("div", {key:m.label, style:{background:C.bg3,borderRadius:8,padding:"10px 12px"}},
            React.createElement("div", {style:{fontSize:18,fontWeight:500,color:m.color}}, m.value),
            React.createElement("div", {style:{fontSize:11,color:C.text3}}, m.label)
          )
        )
      )
    )
  );
}

// ── Fixtures ──────────────────────────────────────────────────

function FixturesPage({onToast}) {
  const {data, loading, error, retry, setData} = useApi("/api/admin/fixtures");
  const [sel, setSel] = React.useState(null);
  const [locking, setLocking] = React.useState({});

  async function toggleLock(fix) {
    setLocking(l => ({...l, [fix.id]:true}));
    try {
      const path = fix.locked ? "/api/admin/unlock-fixture/"+fix.id : "/api/admin/lock-fixture/"+fix.id;
      await api(path, {method:"POST"});
      setData(prev => prev ? {...prev, fixtures:prev.fixtures.map(f => f.id===fix.id ? {...f,locked:fix.locked?0:1} : f)} : prev);
      onToast((fix.locked?"Unlocked":"Locked")+": "+fix.home_team+" vs "+fix.away_team);
    } catch(e) { onToast("Error: "+e.message); }
    setLocking(l => ({...l, [fix.id]:false}));
  }

  if (loading) return React.createElement(Spinner);
  if (error) return React.createElement(ErrBox, {msg:"Failed to load fixtures: "+error, onRetry:retry});

  const fixtures = data?.fixtures || [];
  const f = sel!=null ? fixtures.find(x=>x.id===sel) : null;

  return React.createElement("div", null,
    React.createElement("div", {style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10,marginBottom:f?"1rem":0}},
      fixtures.map(fix =>
        React.createElement("div", {key:fix.id, style:{...card,border:"0.5px solid "+(sel===fix.id?C.purple:C.border)}},
          React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            React.createElement("span", {style:{fontSize:10,color:C.text3}}, (fix.competition||"")+(fix.gameweek?" · GW"+fix.gameweek:"")),
            React.createElement("div", {style:{display:"flex",gap:6,alignItems:"center"}},
              React.createElement(Pill, {color:fix.locked?C.redText:C.greenText, bg:fix.locked?C.redDim:C.greenDim}, fix.locked?"Locked":"Open"),
              React.createElement("button", {
                onClick: e => { e.stopPropagation(); toggleLock(fix); },
                disabled: !!locking[fix.id],
                style:{background:fix.locked?C.greenDim:C.redDim,border:"0.5px solid "+(fix.locked?C.green:C.red),borderRadius:6,color:fix.locked?C.greenText:C.redText,fontSize:10,padding:"2px 7px",fontWeight:500}
              }, locking[fix.id]?"...":fix.locked?"Unlock":"Lock")
            )
          ),
          React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}, onClick:()=>setSel(sel===fix.id?null:fix.id)},
            React.createElement("span", {style:{fontWeight:500,fontSize:14}}, fix.home_team),
            React.createElement("span", {style:{fontSize:11,color:C.text3}}, "vs"),
            React.createElement("span", {style:{fontWeight:500,fontSize:14}}, fix.away_team)
          ),
          React.createElement("div", {style:{fontSize:11,color:C.text3}}, fix.match_date),
          fix.home_score!=null && React.createElement("div", {style:{fontSize:13,fontWeight:500,color:C.green,textAlign:"center",marginTop:4}}, fix.home_score+" – "+fix.away_score)
        )
      )
    ),
    f && React.createElement("div", {style:{...card,border:"0.5px solid "+C.purple}},
      React.createElement("div", {style:{display:"flex",justifyContent:"space-between",marginBottom:14}},
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:16,fontWeight:500}}, f.home_team+" vs "+f.away_team),
          React.createElement("div", {style:{fontSize:11,color:C.text3}}, (f.competition||"")+(f.gameweek?" · GW"+f.gameweek:"")+" · "+f.match_date)
        ),
        React.createElement("button", {onClick:()=>setSel(null), style:{background:"none",border:"none",color:C.text3,fontSize:18}}, "×")
      ),
      React.createElement("div", {style:{fontSize:13,color:C.text2}},
        f.home_score!=null
          ? React.createElement("span", {style:{color:C.green,fontWeight:500}}, "Result: "+f.home_score+" – "+f.away_score)
          : React.createElement("span", {style:{color:C.text3}}, "No result yet")
      ),
      React.createElement("div", {style:{marginTop:8,fontSize:12,color:C.text3}}, "Match ID: #"+f.id)
    )
  );
}

// ── Leaderboard ───────────────────────────────────────────────

function LeaderboardPage() {
  const {data, loading, error, retry} = useApi("/api/admin/leaderboard");
  if (loading) return React.createElement(Spinner);
  if (error) return React.createElement(ErrBox, {msg:"Failed to load leaderboard: "+error, onRetry:retry});
  const users = data?.leaderboard || [];
  return React.createElement("div", {style:card},
    React.createElement("div", {style:{...secTitle,marginBottom:14}}, "Season leaderboard"),
    users.length===0
      ? React.createElement("div", {style:{fontSize:12,color:C.text3}}, "No data yet.")
      : users.map((u,i) =>
          React.createElement("div", {key:i, style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<users.length-1?"0.5px solid "+C.border:"none"}},
            React.createElement("div", {style:{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,flexShrink:0,
              background:i===0?C.amberDim:i===1?C.blueDim:C.bg3,
              color:i===0?C.amberText:i===1?C.blueText:C.text3,
              border:"0.5px solid "+(i===0?C.amber:i===1?C.blue:C.border)
            }}, i+1),
            React.createElement("div", {style:{flex:1}},
              React.createElement("div", {style:{fontSize:13,fontWeight:i<3?500:400}}, u.username),
              React.createElement("div", {style:{fontSize:11,color:C.text3}}, (u.correct_results||0)+" correct · "+(u.predictions_scored||0)+" scored")
            ),
            React.createElement("div", {style:{textAlign:"right"}},
              React.createElement("div", {style:{fontSize:16,fontWeight:500,color:i===0?C.amberText:C.text1}}, u.total_points||0),
              React.createElement("div", {style:{fontSize:10,color:C.text3}}, "pts")
            )
          )
        )
  );
}

// ── Audit ─────────────────────────────────────────────────────

function AuditPage() {
  const {data, loading, error, retry} = useApi("/api/admin/audit");
  if (loading) return React.createElement(Spinner);
  if (error) return React.createElement(ErrBox, {msg:"Failed to load audit: "+error, onRetry:retry});
  const entries = data?.audit_log || [];
  return React.createElement("div", {style:card},
    React.createElement("div", {style:secTitle}, "Audit log"),
    entries.length===0
      ? React.createElement("div", {style:{fontSize:12,color:C.text3}}, "No entries found.")
      : entries.map((e,i) =>
          React.createElement("div", {key:i, style:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:i<entries.length-1?"0.5px solid "+C.border:"none"}},
            React.createElement("span", {style:{fontSize:11,color:C.text3,minWidth:80,whiteSpace:"nowrap"}}, e.changed_at ? new Date(e.changed_at).toLocaleTimeString() : "—"),
            React.createElement("div", {style:{flex:1}},
              React.createElement("div", {style:{fontSize:12,color:C.text1}}, e.home_team&&e.away_team ? e.home_team+" vs "+e.away_team+" ("+e.new_home_score+"-"+e.new_away_score+")" : "—"),
              React.createElement("div", {style:{fontSize:11,color:C.text3}}, e.username + (e.old_home_score!=null?" · was "+e.old_home_score+"-"+e.old_away_score:" · new prediction"))
            )
          )
        )
  );
}

// ── Settings ──────────────────────────────────────────────────

function SettingsPage() {
  const {data, loading, error, retry} = useApi("/api/admin/settings");
  const [local, setLocal] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  React.useEffect(() => { if (data) setLocal(data); }, [data]);
  if (loading) return React.createElement(Spinner);
  if (error) return React.createElement(ErrBox, {msg:"Failed to load settings: "+error, onRetry:retry});
  const st = local || {};

  async function save() {
    setSaving(true);
    try {
      await api("/api/admin/settings", {method:"PATCH", body:JSON.stringify({
        reminder_window: st.reminder_window,
        remindmissing_dms: String(!!st.remindmissing_dms),
        reveal_predictions: st.reveal_predictions,
      })});
      setSaved(true); setTimeout(()=>setSaved(false), 2000);
    } catch(e) { alert("Save failed: "+e.message); }
    setSaving(false);
  }

  return React.createElement("div", null,
    React.createElement("div", {style:{...card,marginBottom:"1rem"}},
      React.createElement("div", {style:secTitle}, "Reminder settings"),
      React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:"0.5px solid "+C.border}},
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:13}}, "DM reminders"),
          React.createElement("div", {style:{fontSize:11,color:C.text3}}, "remindmissing_dms")
        ),
        React.createElement(Toggle, {value:!!st.remindmissing_dms, onChange:()=>setLocal(p=>({...p,remindmissing_dms:!p.remindmissing_dms}))})
      ),
      React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0"}},
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:13}}, "Reminder window"),
          React.createElement("div", {style:{fontSize:11,color:C.text3}}, "Hours before kickoff")
        ),
        React.createElement("div", {style:{display:"flex",gap:6}},
          ["off","1h","3h","6h","12h","24h"].map(h =>
            React.createElement("button", {key:h,
              onClick:()=>setLocal(p=>({...p,reminder_window:h})),
              style:{padding:"4px 8px",borderRadius:7,border:"0.5px solid "+(st.reminder_window===h?C.purple:C.border),background:st.reminder_window===h?C.purpleDim:C.bg3,color:st.reminder_window===h?C.purpleText:C.text2,fontSize:11}
            }, h)
          )
        )
      )
    ),
    React.createElement("div", {style:{...card,marginBottom:"1rem"}},
      React.createElement("div", {style:secTitle}, "Reveal settings"),
      React.createElement("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0"}},
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:13}}, "Reveal mode")
        ),
        React.createElement("div", {style:{display:"flex",gap:6}},
          ["after_lock","after_results","never"].map(m =>
            React.createElement("button", {key:m,
              onClick:()=>setLocal(p=>({...p,reveal_predictions:m})),
              style:{padding:"4px 8px",borderRadius:7,border:"0.5px solid "+(st.reveal_predictions===m?C.teal:C.border),background:st.reveal_predictions===m?C.tealDim:C.bg3,color:st.reveal_predictions===m?C.tealText:C.text2,fontSize:11,fontFamily:"monospace"}
            }, m)
          )
        )
      )
    ),
    React.createElement("button", {onClick:save, disabled:saving,
      style:{background:C.purple,border:"none",borderRadius:8,color:"#fff",padding:"10px 24px",fontSize:13,fontWeight:500,opacity:saving?0.7:1}
    }, saved?"✓ Saved!":saving?"Saving...":"Save Settings")
  );
}

// ── System ────────────────────────────────────────────────────

function SystemPage({ovData, ovError}) {
  const {data:settings, loading:sLoad} = useApi("/api/admin/settings");
  const checks = [
    {label:"Bot status", value:"Online", ok:!ovError},
    {label:"Database", value:ovData?"Connected · PostgreSQL":"Unknown", ok:!!ovData},
    {label:"Railway deploy", value:"Active", ok:true},
    {label:"Admin API", value:"Listening on port 3000", ok:true},
  ];
  return React.createElement("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
    React.createElement("div", {style:card},
      React.createElement("div", {style:secTitle}, "System health"),
      checks.map((c,i) =>
        React.createElement("div", {key:c.label, style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<checks.length-1?"0.5px solid "+C.border:"none"}},
          React.createElement("div", null,
            React.createElement("div", {style:{fontSize:12}}, c.label),
            React.createElement("div", {style:{fontSize:11,color:C.text3}}, c.value)
          ),
          React.createElement("span", {style:{width:8,height:8,borderRadius:"50%",background:c.ok?C.green:C.red,display:"inline-block"}})
        )
      )
    ),
    React.createElement("div", {style:card},
      React.createElement("div", {style:secTitle}, "Settings snapshot"),
      sLoad ? React.createElement(Spinner) :
      [
        ["Current GW", ovData?.current_gw?.label||"—", C.blueText],
        ["Upcoming", ovData?.upcoming_matches||0, C.text1],
        ["Predictions", ovData?.total_predictions||0, C.purpleText],
        ["Reminder window", settings?.reminder_window||"off", C.amberText],
        ["DM reminders", settings?.remindmissing_dms?"Enabled":"Disabled", settings?.remindmissing_dms?C.greenText:C.redText],
        ["Reveal mode", settings?.reveal_predictions||"—", C.tealText],
        ["Last sync", ovData?.last_sync||"Never", C.text2],
      ].map(([k,v,col]) =>
        React.createElement("div", {key:k, style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"0.5px solid "+C.border,fontSize:12}},
          React.createElement("span", {style:{color:C.text3}}, k),
          React.createElement("span", {style:{color:col,fontWeight:500}}, v)
        )
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────

function App() {
  const [page, setPage] = React.useState("overview");
  const [sidebarOpen, setSidebarOpen] = React.useState(true);
  const [toast, setToast] = React.useState(null);
  const [tick, setTick] = React.useState(0);
  const {data:ovData, loading:ovLoading, error:ovError} = useApi("/api/admin/overview", [tick]);
  const onToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 3000); };
  const onRefresh = () => setTick(t=>t+1);
  const titles = {overview:"Overview",users:"Users",fixtures:"Fixtures",leaderboard:"Leaderboard",audit:"Audit Log",settings:"Settings",system:"System"};

  return React.createElement("div", {style:{display:"flex",background:C.bg0,minHeight:"100vh",color:C.text1,fontFamily:"system-ui,sans-serif"}},
    React.createElement("div", {style:{width:sidebarOpen?200:52,flexShrink:0,background:C.bg1,borderRight:"0.5px solid "+C.border,display:"flex",flexDirection:"column",transition:"width 0.2s",overflow:"hidden"}},
      React.createElement("div", {style:{padding:"14px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"0.5px solid "+C.border,minHeight:52}},
        sidebarOpen && React.createElement("div", {style:{fontSize:13,fontWeight:500,color:C.purpleText,whiteSpace:"nowrap"}}, "⚽ Prediction Bot"),
        React.createElement("button", {onClick:()=>setSidebarOpen(o=>!o), style:{background:"none",border:"none",color:C.text3,fontSize:16,lineHeight:1,marginLeft:"auto",padding:0}}, sidebarOpen?"◂":"▸")
      ),
      React.createElement("nav", {style:{flex:1,padding:"8px 0"}},
        NAV.map(item =>
          React.createElement("button", {key:item.id, onClick:()=>setPage(item.id),
            style:{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:page===item.id?C.purpleDim:"none",border:"none",borderLeft:"2px solid "+(page===item.id?C.purple:"transparent"),color:page===item.id?C.purpleText:C.text2,fontSize:13,fontWeight:page===item.id?500:400,textAlign:"left",whiteSpace:"nowrap"}
          },
            React.createElement("span", {style:{fontSize:16,flexShrink:0}}, item.icon),
            sidebarOpen && React.createElement("span", null, item.label)
          )
        )
      ),
      sidebarOpen && React.createElement("div", {style:{padding:"12px 14px",borderTop:"0.5px solid "+C.border,fontSize:10,color:C.text3}}, "v1.3 · live")
    ),
    React.createElement("div", {style:{flex:1,overflow:"auto",minWidth:0}},
      React.createElement("div", {style:{padding:"1rem 1.25rem",borderBottom:"0.5px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.bg1}},
        React.createElement("div", {style:{fontSize:16,fontWeight:500}}, titles[page]),
        React.createElement("div", {style:{display:"flex",alignItems:"center",gap:8}},
          ovLoading
            ? React.createElement("span", {style:{fontSize:12,color:C.text3}}, "connecting...")
            : React.createElement(React.Fragment, null,
                React.createElement("span", {style:{width:7,height:7,borderRadius:"50%",background:ovError?C.red:C.green,display:"inline-block"}}),
                React.createElement("span", {style:{fontSize:12,color:ovError?C.red:C.green}}, ovError?"error":"online")
              ),
          ovData?.current_gw?.label && React.createElement(React.Fragment, null,
            React.createElement("span", {style:{color:C.border,margin:"0 4px"}}, "|"),
            React.createElement("span", {style:{fontSize:12,color:C.text3}}, ovData.current_gw.label)
          ),
          React.createElement("button", {onClick:onRefresh, style:{background:"none",border:"0.5px solid "+C.border,borderRadius:6,color:C.text3,fontSize:14,padding:"2px 8px",marginLeft:6,lineHeight:1}}, "↻")
        )
      ),
      React.createElement("div", {style:{padding:"1.25rem"}},
        page==="overview"    && React.createElement(OverviewPage, {ovData, onToast, onRefresh}),
        page==="users"       && React.createElement(UsersPage),
        page==="fixtures"    && React.createElement(FixturesPage, {onToast}),
        page==="leaderboard" && React.createElement(LeaderboardPage),
        page==="audit"       && React.createElement(AuditPage),
        page==="settings"    && React.createElement(SettingsPage),
        page==="system"      && React.createElement(SystemPage, {ovData, ovError})
      )
    ),
    React.createElement(Toast, {msg:toast, onClose:()=>setToast(null)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
